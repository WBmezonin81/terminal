  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogItCi0LXRgNC80LjQvdCw0Lsg0LLRi9C00LDRh9C4INCc0VgiLAogICJzaG9ydF9uYW1lIjogItCi0LXRgNC80LjQvdCw0Lsg0Cc0VgiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiI2Y2ZjZmOSIsCiAgInRoZW1lX2NvbG9yIjogIiM0ODExNzMiLAogICJvcmllbnRhdGlvbiI6ICJwb3J0cmFpdC1wcmltYXJ5Igp9">

<body>

  <iframe src="https://script.google.com/macros/s/AKfycbw4OMjEEskdQQdG7b8CdTgcowaEyhmgMSYZx46NlI8GtHkhvTXy0esUKS6ivWFnag/exec"></iframe>

  <script>
    // Активируем фоновый процесс (Service Worker) прямо "на лету"
    const swCode = `
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
      self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
    `;
    
    if ('serviceWorker' in navigator) {
      const blob = new Blob([swCode], { type: 'text/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl, { scope: './' })
        .then(() => console.log('PWA оболочка запущена!'))
        .catch(err => console.error(err));
    }
  </script>
</body>
