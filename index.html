<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        /* Сбрасываем все стандартные отступы браузера */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Черный фон на время загрузки */
        }

        /* Контейнер для полноэкранного отображения твоего скрипта */
        .terminal-frame-container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            border: none;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="terminal-frame-container">
        <iframe src="https://script.google.com/macros/s/AKfycbw4OMjEEskdQQdG7b8CdTgcowaEyhmgMSYZx46NlI8GtHkhvTXy0esUKS6ivWFnag/exec"></iframe>
    </div>

</html>
